<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent2: #53d8fb;
    --text: #e0e0e0;
    --text-dim: #7f8c8d;
    --correct: #2ecc71;
    --wrong: #e74c3c;
    --pending: #4a5568;
    --cursor-bg: #e94560;
  }

  /* ===== LIGHT THEME ===== */
  body.light {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e2e8f0;
    --text: #1a202c;
    --text-dim: #718096;
    --pending: #a0aec0;
    --cursor-bg: #e94560;
  }
  body.light .kb-key { background: #e2e8f0; border-color: #cbd5e0; color: #4a5568; }
  body.light .kb-key.hl { background: var(--accent2); color: #fff; }
  body.light #virtual-keyboard { background: #f7fafc; border-color: #e2e8f0; }
  body.light .text-box { border-color: #e2e8f0; }
  body.light .typo-bar-wrap { background: #e2e8f0; }
  body.light .advice-box { background: #dbeafe; }
  body.light #history-chart { background: #e2e8f0; }

  /* ===== HEADER TOP ===== */
  .header-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    width: 100%;
    position: relative;
  }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    position: absolute;
    right: 0;
  }
  .icon-btn {
    background: var(--surface);
    border: none;
    color: var(--text-dim);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  .icon-btn.snd-on { color: var(--accent2); }

  /* ===== STREAK BADGE ===== */
  .streak-badge {
    background: var(--surface);
    border-radius: 20px;
    padding: 5px 11px;
    font-size: 0.8rem;
    color: var(--text);
    user-select: none;
    white-space: nowrap;
  }

  /* ===== TIMER SELECTOR ===== */
  .timer-selector {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
  }
  .timer-selector.hidden { display: none; }
  .timer-opt {
    background: var(--surface);
    border: 2px solid transparent;
    color: var(--text-dim);
    padding: 4px 13px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .timer-opt.active { border-color: var(--accent); color: var(--accent); }

  /* ===== PACE INDICATOR ===== */
  #stat-pace { font-size: 1.6rem; }
  #pace-stat { display: none; }

  /* ===== LIVE WPM GRAPH ===== */
  #live-wpm-wrap {
    background: var(--surface);
    border-radius: 8px;
    padding: 6px 8px 4px;
    position: relative;
  }
  #live-wpm-canvas {
    display: block;
    width: 100%;
    height: 48px;
    border-radius: 4px;
  }
  #live-wpm-label {
    position: absolute;
    top: 6px;
    left: 12px;
    font-size: 0.62rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ===== COUNTDOWN OVERLAY ===== */
  #countdown-overlay {
    position: fixed;
    inset: 0;
    background: #000000cc;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(8px);
  }
  #countdown-overlay.hidden { display: none; }
  #countdown-number {
    font-size: 7rem;
    font-weight: bold;
    color: var(--accent2);
    line-height: 1;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 40px currentColor;
    animation: cd-pop 0.7s ease;
  }
  #countdown-number.go {
    color: var(--correct);
    animation: cd-go 0.5s ease forwards;
  }
  @keyframes cd-pop {
    0% { transform: scale(1.6); opacity: 0; }
    60% { opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes cd-go {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); opacity: 0; }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Consolas, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ========== HEADER ========== */
  header {
    width: 100%;
    max-width: 860px;
    padding: 24px 20px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  h1 {
    font-size: 1.6rem;
    letter-spacing: 0.12em;
    color: var(--accent2);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    display: block;
    flex-shrink: 0;
  }

  .logo-text span {
    color: var(--accent);
  }

  /* ========== TABS ========== */
  .tabs {
    display: flex;
    background: var(--surface);
    border-radius: 40px;
    padding: 4px;
    gap: 4px;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 8px 28px;
    border-radius: 36px;
    font-size: 0.95rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.06em;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* ========== MODE SELECTOR ========== */
  .mode-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mode-btn {
    background: var(--surface);
    border: 2px solid transparent;
    color: var(--text-dim);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn.active {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* ========== LEVEL SELECTOR ========== */
  .level-row {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }

  .level-btn {
    background: var(--surface);
    border: 2px solid transparent;
    color: var(--text-dim);
    padding: 5px 16px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }

  .level-btn[data-level="easy"].active   { border-color: #2ecc71; color: #2ecc71; }
  .level-btn[data-level="normal"].active { border-color: var(--accent2); color: var(--accent2); }
  .level-btn[data-level="hard"].active   { border-color: var(--accent); color: var(--accent); }

  /* ========== MAIN AREA ========== */
  main {
    width: 100%;
    max-width: 860px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ========== STATS BAR ========== */
  .stats-bar {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-value {
    font-size: 2rem;
    font-weight: bold;
    color: var(--accent2);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .timer-value {
    color: var(--accent);
  }

  .timer-value.urgent {
    color: #ff6b6b;
    animation: pulse 0.5s infinite alternate;
  }

  @keyframes pulse {
    from { opacity: 1; }
    to { opacity: 0.5; }
  }

  /* ========== PROGRESS BAR ========== */
  .progress-wrap {
    height: 4px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* ========== TEXT DISPLAY ========== */
  .text-box {
    background: var(--surface);
    border-radius: 12px;
    padding: 28px 32px;
    min-height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border: 1px solid #ffffff0d;
  }

  .text-display {
    font-size: 1.55rem;
    line-height: 1.8;
    letter-spacing: 0.05em;
    word-break: break-all;
    text-align: center;
    user-select: none;
  }

  .char {
    display: inline-block;
    position: relative;
    transition: color 0.08s;
  }

  .char.correct { color: var(--correct); }
  .char.wrong   { color: var(--wrong); background: #e74c3c22; border-radius: 3px; }
  .char.pending { color: var(--pending); }

  .char.cursor::after {
    content: '';
    position: absolute;
    left: -1px;
    top: 0;
    width: 2px;
    height: 100%;
    background: var(--cursor-bg);
    border-radius: 2px;
    animation: blink 0.8s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ========== INPUT AREA ========== */
  .input-wrap {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  #typing-input {
    flex: 1;
    background: var(--surface);
    border: 2px solid var(--surface2);
    border-radius: 10px;
    color: var(--text);
    font-size: 1.1rem;
    font-family: inherit;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }

  #typing-input:focus {
    border-color: var(--accent2);
  }

  #typing-input.error {
    border-color: var(--wrong);
  }

  #typing-input:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ========== BUTTONS ========== */
  .btn {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .btn:hover { filter: brightness(1.15); }
  .btn:active { transform: scale(0.97); }

  .btn-secondary {
    background: var(--surface2);
  }

  /* ========== HINT ========== */
  .hint {
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-dim);
    min-height: 1.2em;
  }

  /* ========== MODAL ========== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: #00000088;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(6px);
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--surface);
    border-radius: 20px;
    padding: 40px 48px;
    max-width: 480px;
    width: 90%;
    border: 1px solid var(--surface2);
    box-shadow: 0 24px 60px #00000066;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .modal h2 {
    font-size: 1.6rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .result-card {
    background: var(--surface2);
    border-radius: 12px;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .result-card .val {
    font-size: 2rem;
    font-weight: bold;
    color: var(--accent2);
  }

  .result-card .lbl {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .best-badge {
    background: linear-gradient(90deg, var(--accent), #ff8c00);
    color: #fff;
    padding: 6px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    display: inline-block;
  }

  .advice-box {
    background: #0f3460;
    border-left: 3px solid var(--accent2);
    border-radius: 8px;
    padding: 14px 16px;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .advice-label {
    font-size: 0.7rem;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .advice-box p {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.6;
    font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
  }

  .modal-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  /* ========== VIRTUAL KEYBOARD ========== */
  #virtual-keyboard {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 14px 12px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid #ffffff0d;
    user-select: none;
  }

  .kb-row { display: flex; gap: 4px; }

  .kb-key {
    min-width: 32px;
    height: 32px;
    background: var(--surface2);
    border: 1px solid #ffffff18;
    border-bottom: 3px solid #00000055;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.68rem;
    color: var(--text-dim);
    transition: background 0.07s, color 0.07s, transform 0.07s;
    padding: 0 5px;
  }

  .kb-key.hl {
    background: var(--accent2);
    color: #000;
    border-color: #53d8fb80;
    box-shadow: 0 0 8px #53d8fb44;
  }

  .kb-key.flash {
    background: var(--accent);
    color: #fff;
    transform: translateY(2px);
    border-bottom-width: 1px;
  }

  .kb-space { min-width: 160px; }

  /* ========== HISTORY CHART ========== */
  .res-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .res-section-label {
    font-size: 0.68rem;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  #history-chart {
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 8px 4px;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ========== TYPO ANALYSIS ========== */
  .typo-item {
    display: grid;
    grid-template-columns: 36px 1fr 36px;
    align-items: center;
    gap: 8px;
  }

  .typo-char {
    font-size: 1.05rem;
    color: var(--accent);
    font-weight: bold;
    text-align: center;
  }

  .typo-bar-wrap {
    background: #0f3460;
    border-radius: 4px;
    height: 7px;
    overflow: hidden;
  }

  .typo-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #ff8c00);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .typo-count { font-size: 0.72rem; color: var(--text-dim); text-align: right; }

  /* ========== CUSTOM TEXT MODAL ========== */
  .custom-desc {
    font-size: 0.83rem;
    color: var(--text-dim);
    text-align: left;
    line-height: 1.5;
  }

  #custom-textarea {
    width: 100%;
    background: var(--surface2);
    border: 2px solid var(--surface2);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    font-family: 'Hiragino Sans', 'Yu Gothic', monospace;
    padding: 12px;
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.2s;
  }

  #custom-textarea:focus { border-color: var(--accent2); }

  .modal { overflow-y: auto; max-height: 90vh; }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 600px) {
    .text-display { font-size: 1.2rem; }
    .modal { padding: 28px 20px; }
    .result-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>
      <svg class="logo-icon" width="40" height="40" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="5" fill="#16213e"/>
        <rect x="3" y="5" width="5" height="6" rx="1.5" fill="#53d8fb"/>
        <rect x="10" y="5" width="5" height="6" rx="1.5" fill="#53d8fb"/>
        <rect x="17" y="5" width="5" height="6" rx="1.5" fill="#53d8fb"/>
        <rect x="24" y="5" width="5" height="6" rx="1.5" fill="#e94560"/>
        <rect x="3" y="13" width="5" height="6" rx="1.5" fill="#e94560"/>
        <rect x="10" y="13" width="5" height="6" rx="1.5" fill="#53d8fb"/>
        <rect x="17" y="13" width="5" height="6" rx="1.5" fill="#53d8fb"/>
        <rect x="24" y="13" width="5" height="6" rx="1.5" fill="#53d8fb"/>
        <rect x="6" y="21" width="20" height="6" rx="2" fill="#53d8fb"/>
      </svg>
      <span class="logo-text">Typing<span> Practice</span></span>
    </h1>
    <div class="header-controls">
      <span class="streak-badge" id="streak-badge">🔥 0日</span>
      <button id="sound-toggle" class="icon-btn" title="サウンドON/OFF">🔇</button>
      <button id="theme-toggle" class="icon-btn" title="テーマ切り替え">🌙</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-lang="ja">日本語</button>
    <button class="tab-btn" data-lang="en">English</button>
  </div>

  <div class="mode-row">
    <button class="mode-btn active" data-mode="timed">タイムアタック</button>
    <button class="mode-btn" data-mode="endless">全文完走モード</button>
    <button class="mode-btn" data-mode="weak">苦手文字練習</button>
    <button class="mode-btn" id="custom-btn">カスタム文章</button>
  </div>

  <div class="timer-selector" id="timer-selector">
    <button class="timer-opt" data-time="15">15秒</button>
    <button class="timer-opt" data-time="30">30秒</button>
    <button class="timer-opt active" data-time="60">60秒</button>
    <button class="timer-opt" data-time="120">120秒</button>
  </div>

  <div class="level-row">
    <button class="level-btn active" data-level="easy">かんたん</button>
    <button class="level-btn" data-level="normal">ふつう</button>
    <button class="level-btn" data-level="hard">むずかしい</button>
  </div>
</header>

<main>
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value" id="stat-wpm">0</span>
      <span class="stat-label">WPM</span>
    </div>
    <div class="stat">
      <span class="stat-value timer-value" id="stat-timer">60</span>
      <span class="stat-label" id="timer-label">秒</span>

// ============================================================
//  BUILD TRIE for prefix matching
// ============================================================
function buildRomajiTrie() {
  // Returns a map: hiragana sequence -> array of romaji patterns
  // We also need a trie for greedy matching of longest hiragana keys

  // Sort keys by length descending so longer combos match first
  const keys = Object.keys(ROMAJI_MAP).sort((a,b) => b.length - a.length);

  // trie node: { children: {char: node}, readings: [string] }
  const root = { children: {}, readings: [] };

  for (const hira of keys) {
    let node = root;
    for (const ch of hira) {
      if (!node.children[ch]) node.children[ch] = { children: {}, readings: [] };
      node = node.children[ch];
    }
    const val = ROMAJI_MAP[hira];
    node.readings = Array.isArray(val) ? val : [val];
    node.readings = node.readings.map(r => r.toLowerCase());
  }
  return root;
}

const ROMAJI_TRIE = buildRomajiTrie();

// Convert hiragana text to a list of {hira, options} segments
function hiraToSegments(text) {
  // カタカナ（ァ〜ン: U+30A1〜U+30F6）をひらがなに変換してから処理する
  // ー・、。等はそのまま（ROMAJI_MAP に登録済み）
  text = text.replace(/[\u30A1-\u30F6]/g,
    ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));

  const segments = [];
  let i = 0;
  while (i < text.length) {
    const ch = text[i];

    // Special: っ before consonant = double the next consonant
    if (ch === 'っ') {
      // peek ahead
      const nextSeg = peekNextSegment(text, i + 1);
      if (nextSeg && nextSeg.options.length > 0) {
        const doubled = nextSeg.options
          .map(r => r[0] + r)  // double first letter
          .filter(r => /^[a-z]/.test(r));
        if (doubled.length > 0) {
          segments.push({ hira: 'っ' + nextSeg.hira, options: doubled.concat(['xtu', 'ltsu']) });
          i += 1 + nextSeg.hira.length;
          continue;
        }
      }
      segments.push({ hira: 'っ', options: ['xtu', 'ltsu'] });
      i++;
      continue;
    }

    // Special: ん handling (not followed by vowel/na-row)
    if (ch === 'ん') {
      const next = text[i + 1] || '';
      const isVowelOrN = 'あいうえおやゆよなにぬねのんａｉｕｅｏ'.includes(next);
      if (isVowelOrN) {
        segments.push({ hira: 'ん', options: ["nn"] });
      } else {
        segments.push({ hira: 'ん', options: ["n", "nn", "n'"] });
      }
      i++;
      continue;
    }

    // Try trie match (longest first: 2 chars, then 1)
    let matched = false;
    let node = ROMAJI_TRIE;
    let lastMatch = null;
    let matchLen = 0;

    for (let j = i; j < Math.min(i + 4, text.length); j++) {
      const c = text[j];
      if (!node.children[c]) break;
      node = node.children[c];
      if (node.readings.length > 0) {
        lastMatch = node;
        matchLen = j - i + 1;
      }
    }

    if (lastMatch) {
      segments.push({ hira: text.slice(i, i + matchLen), options: [...lastMatch.readings] });
      i += matchLen;
      matched = true;
    }

    if (!matched) {
      // Pass through non-hiragana characters as-is
      segments.push({ hira: ch, options: [ch.toLowerCase()] });
      i++;
    }
  }
  return segments;
}

function peekNextSegment(text, i) {
  if (i >= text.length) return null;
  const segs = hiraToSegments(text.slice(i, i + 4));
  return segs.length > 0 ? segs[0] : null;
}

// ============================================================
//  SHUFFLE / QUEUE
// ============================================================
function shuffled(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQueue() {
  if (state.mode === 'weak') return buildWeakQueue();
  return shuffled(TEXTS[state.lang][state.level]);
}

function buildWeakQueue() {
  // Collect all stored typos for this lang
  const allTypos = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(`typos_${state.lang}`)) {
      try {
        const data = JSON.parse(localStorage.getItem(key) || '{}');
        for (const [ch, cnt] of Object.entries(data)) {
          allTypos[ch] = (allTypos[ch] || 0) + cnt;
        }
      } catch(e) {}
    }
  }
  const sorted = Object.entries(allTypos).sort((a, b) => b[1] - a[1]);
  if (sorted.length === 0) return shuffled(TEXTS[state.lang][state.level]);
  const weakChars = sorted.slice(0, 6).map(([ch]) => ch);
  // Find sentences containing at least one weak char
  const all = Object.values(TEXTS[state.lang]).flat();
  const filtered = all.filter(t => weakChars.some(ch => t.includes(ch)));
  return shuffled(filtered.length >= 3 ? filtered : all);
}

function buildJaDisplay(segments, segIdx, inputBuffer) {
  // Build flat char list for display: each segment maps to its "display string"
  // For completed segments: show the hiragana as correct
  // For current segment: show typed chars (buffer) and remaining
  // For future segments: show hiragana as pending

  let html = '';

  for (let s = 0; s < segments.length; s++) {
    const seg = segments[s];
    const hira = seg.hira;

    if (s < segIdx) {
      // completed
      for (const ch of hira) {
        html += `<span class="char correct">${ch}</span>`;
      }
    } else if (s === segIdx) {
      // current segment — show hira chars with cursor on first
      for (let ci = 0; ci < hira.length; ci++) {
        const cls = ci === 0 ? 'char pending cursor' : 'char pending';
        html += `<span class="${cls}">${hira[ci]}</span>`;
      }
    } else {
      // future
      for (const ch of hira) {
        html += `<span class="char pending">${ch}</span>`;
      }
    }
  }
  return html;
}

function buildEnDisplay(chars, charIdx) {
  let html = '';
  for (let i = 0; i < chars.length; i++) {
    let cls = 'char';
    if (i < charIdx) cls += ' correct';
    else if (i === charIdx) cls += ' pending cursor';
    else cls += ' pending';
    html += `<span class="${cls}">${chars[i] === ' ' ? '&nbsp;' : chars[i]}</span>`;
  }
  return html;
}

function renderText() {
  if (state.lang === 'ja') {
    textDisplay.innerHTML = buildJaDisplay(state.segments, state.segIdx, state.inputBuffer);
  } else {
    textDisplay.innerHTML = buildEnDisplay(state.segments, state.segIdx);
  }
}

// ============================================================
//  LOAD SENTENCE
// ============================================================
function loadSentence(text) {
  state.segments = [];
  state.segIdx = 0;
  state.inputBuffer = '';

  if (state.lang === 'ja') {
    state.segments = hiraToSegments(text);
  } else {
    state.segments = text.split('');
  }

  // Find the active option for each segment (used for hints)
  if (state.lang === 'ja') {
    state.segments.forEach(s => { s.activeOpt = 0; });
  }

  renderText();
  updateHint();
  updateKeyboard();
}

function nextSentence() {
  state.sentencesDone++;
  state.currentIndex++;

  if (state.mode === 'endless' && state.currentIndex >= state.textQueue.length) {
    endSession();
    return;
  }

  if (state.currentIndex >= state.textQueue.length) {
    // refill queue for timed mode
    state.textQueue = state.textQueue.concat(buildQueue());
  }

  loadSentence(state.textQueue[state.currentIndex]);

  if (state.mode === 'endless') {
    progressBar.style.width = `${(state.currentIndex / state.textQueue.length) * 100}%`;
  }
}

// ============================================================
//  HINT
// ============================================================
function updateHint() {
  if (!state.running && !state.startTime) {
    hintText.textContent = '入力を開始するとタイマーがスタートします';
    return;
  }
  if (state.lang === 'ja' && state.segments.length > 0 && state.segIdx < state.segments.length) {
    const seg = state.segments[state.segIdx];
    const opts = seg.options;
    const typed = state.inputBuffer;
    // Find which option is being typed
    const matching = opts.filter(o => o.startsWith(typed));
    if (matching.length > 0) {
      const show = matching[0];
      hintText.textContent = `→ ${seg.hira} : ${opts.join(' / ')}  [入力中: ${typed || '…'}]`;
    } else {
      hintText.textContent = `→ ${seg.hira} : ${opts.join(' / ')}`;
    }
  } else {
    hintText.textContent = '';
  }
}

// ============================================================
//  STATS
// ============================================================
function calcWpm() {
  if (!state.startTime) return 0;
  const elapsedMin = (Date.now() - state.startTime) / 60000;
  if (elapsedMin < 0.01) return 0;
  // WPM: chars / 5 / minutes
  return Math.round(state.totalCorrectChars / 5 / elapsedMin);
}

function calcAcc() {
  if (state.totalTypedChars === 0) return 100;
  return Math.round((state.totalCorrectChars / state.totalTypedChars) * 100);
}

function updateStats() {
  const wpm = calcWpm();
  const acc = calcAcc();
  statWpm.textContent = wpm;
  statAcc.textContent = acc + '%';
  statScore.textContent = state.totalCorrectChars;
}

// ============================================================
//  TIMER
// ============================================================
function startTimer() {
  if (state.timerInterval) return;

  const isTimed = state.mode === 'timed' || state.mode === 'weak';
  if (isTimed) {
    state.timeLeft = state.selectedTime;
    statTimer.textContent = state.selectedTime;
    timerLabel.textContent = '秒';

    state.timerInterval = setInterval(() => {
      state.timeLeft--;
      statTimer.textContent = state.timeLeft;

      if (state.timeLeft <= 10) statTimer.classList.add('urgent');

      // record live WPM every second
      state.liveWpmData.push(calcWpm());
      updateLiveGraph();
      updatePace();
      updateStats();

      if (state.timeLeft <= 0) endSession();
    }, 1000);
  } else {
    // endless: show elapsed time
    timerLabel.textContent = '秒経過';
    state.timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      statTimer.textContent = elapsed;
      updateStats();
    }, 500);
  }
}

function updateStreak() {
  const today = new Date().toISOString().slice(0, 10);
  const data = JSON.parse(localStorage.getItem('streak') || '{"count":0,"lastDate":""}');
  if (data.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  data.count = (data.lastDate === yesterday) ? data.count + 1 : 1;
  data.lastDate = today;
  localStorage.setItem('streak', JSON.stringify(data));
  renderStreak();
}

// ============================================================
//  SOUNDS (Web Audio API)
// ============================================================
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function playTone(freq, dur, type='sine', vol=0.08) {
  if (!state.soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function playClick()  { playTone(900, 0.045, 'square', 0.06); }
function playError()  { playTone(160, 0.09, 'sawtooth', 0.12); }
function playDone()   {
  [523, 659, 784].forEach((f, i) => {
    setTimeout(() => playTone(f, 0.14, 'sine', 0.1), i * 100);
  });
}
function playCountBeep(isGo) {
  playTone(isGo ? 1046 : 660, 0.12, 'sine', 0.15);
}

// ============================================================
//  LIVE WPM GRAPH
// ============================================================
function updateLiveGraph() {
  const wrap = $('live-wpm-wrap');
  const canvas = $('live-wpm-canvas');
  if (!canvas) return;
  const data = state.liveWpmData;
  if (data.length < 1) return;
  wrap.style.display = 'block';

  const W = canvas.offsetWidth || 800;
  canvas.width = W;
  const H = canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const max = Math.max(...data, getBest(state.lang, state.mode, state.level), 1);
  const step = data.length > 1 ? W / (data.length - 1) : W;

  // best pace dashed line
  const best = getBest(state.lang, state.mode, state.level);
  if (best > 0) {
    const by = H - (best / max) * (H - 4) - 2;
    ctx.beginPath();
    ctx.strokeStyle = '#e9456066';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.moveTo(0, by); ctx.lineTo(W, by);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // live WPM line
  if (data.length >= 2) {
    ctx.beginPath();
    ctx.strokeStyle = '#53d8fb';
    ctx.lineWidth = 2;
    data.forEach((v, i) => {
      const x = i * step;
      const y = H - (v / max) * (H - 4) - 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    // fill under line
    ctx.lineTo((data.length - 1) * step, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = '#53d8fb18';
    ctx.fill();
  }
}

// ============================================================
//  PACE INDICATOR
// ============================================================
function updatePace() {
  const el = $('stat-pace');
  const paceStat = $('pace-stat');
  if (!el || !paceStat) return;
  const isTimed = state.mode === 'timed' || state.mode === 'weak';
  if (!state.running || !isTimed) { paceStat.style.display = 'none'; return; }
  paceStat.style.display = 'flex';
  const best = getBest(state.lang, state.mode, state.level);
  if (best === 0) { el.textContent = '--'; el.style.color = 'var(--text-dim)'; return; }
  const diff = calcWpm() - best;
  el.textContent = (diff >= 0 ? '+' : '') + diff;
  el.style.color = diff >= 0 ? 'var(--correct)' : 'var(--wrong)';
}

// ============================================================
//  COUNTDOWN
// ============================================================
function showCountdown(callback) {
  const overlay = $('countdown-overlay');
  const numEl = $('countdown-number');
  overlay.classList.remove('hidden');
  typingInput.disabled = true;

  let count = 3;
  numEl.className = '';
  numEl.textContent = count;
  playCountBeep(false);

  const tick = setInterval(() => {
    count--;
    if (count > 0) {
      numEl.textContent = count;
      playCountBeep(false);
    } else {
      numEl.textContent = 'GO!';
      numEl.className = 'go';
      playCountBeep(true);
      clearInterval(tick);
      setTimeout(() => {
        overlay.classList.add('hidden');
        typingInput.disabled = false;
        typingInput.focus();
        callback();
      }, 600);
    }
  }, 800);
}

// ============================================================
//  SESSION START / END
// ============================================================
function startSession() {
  state.running = true;
  state.startTime = Date.now();
  typingInput.disabled = false;
  typingInput.focus();
  startTimer();
}

// ============================================================
//  VIRTUAL KEYBOARD
// ============================================================
const KB_ROWS = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['z','x','c','v','b','n','m'],
];

function renderKeyboard() {
  const kb = $('virtual-keyboard');
  kb.innerHTML = '';
  KB_ROWS.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'kb-row';
    row.forEach(k => {
      const el = document.createElement('div');
      el.className = 'kb-key';
      el.dataset.key = k;
      el.textContent = k.toUpperCase();
      rowEl.appendChild(el);
    });
    kb.appendChild(rowEl);
  });
  // スペースバー行
  const spaceRow = document.createElement('div');
  spaceRow.className = 'kb-row';
  const spaceEl = document.createElement('div');
  spaceEl.className = 'kb-key kb-space';
  spaceEl.dataset.key = ' ';
  spaceEl.textContent = 'SPACE';
  spaceRow.appendChild(spaceEl);
  kb.appendChild(spaceRow);
}

function getNextKeys() {
  if (state.segIdx >= state.segments.length) return new Set();
  if (state.lang === 'ja') {
    const seg = state.segments[state.segIdx];
    const buf = state.inputBuffer;
    const keys = new Set();
    seg.options.filter(o => o.startsWith(buf)).forEach(o => {
      if (o.length > buf.length) keys.add(o[buf.length]);
    });
    return keys;
  } else {
    const ch = state.segments[state.segIdx];
    return ch ? new Set([ch === ' ' ? ' ' : ch.toLowerCase()]) : new Set();
  }
}

function updateKeyboard() {
  const next = getNextKeys();
  document.querySelectorAll('.kb-key').forEach(el => {
    el.classList.toggle('hl', next.has(el.dataset.key));
  });
}

function flashKey(ch) {
  const el = document.querySelector(`.kb-key[data-key="${ch}"]`);
  if (!el) return;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 120);
}

// ============================================================
//  SCORE HISTORY
// ============================================================
function historyKey() {
  return `hist_${state.lang}_${state.mode}_${state.level}`;
}

function saveToHistory(wpm, acc) {
  const key = historyKey();
  const hist = JSON.parse(localStorage.getItem(key) || '[]');
  hist.push({ wpm, acc, ts: Date.now() });
  if (hist.length > 20) hist.splice(0, hist.length - 20);
  localStorage.setItem(key, JSON.stringify(hist));
  return hist;
}

function renderHistoryChart(hist) {
  const el = $('history-chart');
  if (hist.length < 2) {
    el.innerHTML = '<span style="color:var(--text-dim);font-size:0.78rem">あと' + (2 - hist.length) + '回プレイするとグラフが表示されます</span>';
    return;
  }
  const W = 360, H = 72;
  const maxW = Math.max(...hist.map(h => h.wpm), 1);
  const n = hist.length;
  const bw = Math.floor((W - 20) / n) - 3;
  let bars = '';
  hist.forEach((h, i) => {
    const bh = Math.max(4, Math.floor((h.wpm / maxW) * (H - 22)));
    const x = 10 + i * (bw + 3);
    const y = H - 14 - bh;
    const isLast = i === n - 1;
    const col = isLast ? '#e94560' : '#53d8fb55';
    bars += `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="2" fill="${col}"/>`;
    if (isLast || i === 0) {
      bars += `<text x="${x + bw / 2}" y="${y - 3}" text-anchor="middle" fill="${isLast ? '#e94560' : '#53d8fb88'}" font-size="9">${h.wpm}</text>`;
    }
  });
  el.innerHTML = `<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${bars}
    <text x="10" y="${H - 2}" fill="#4a5568" font-size="9">全${n}回</text>
    <text x="${W - 10}" y="${H - 2}" text-anchor="end" fill="#4a5568" font-size="9">最高: ${Math.max(...hist.map(h => h.wpm))} WPM</text>
  </svg>`;
}

// ============================================================
//  TYPO ANALYSIS
// ============================================================
function renderTypoAnalysis() {
  const entries = Object.entries(state.typoMap)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 6);
  const el = $('typo-list');
  if (entries.length === 0) {
    el.innerHTML = '<span style="color:#2ecc71;font-size:0.85rem">ミスなし！完璧です 🎉</span>';
    return;
  }
  const max = entries[0][1];
  el.innerHTML = entries.map(([ch, cnt]) => `
    <div class="typo-item">
      <span class="typo-char">${ch}</span>
      <div class="typo-bar-wrap"><div class="typo-bar" style="width:${Math.round((cnt / max) * 100)}%"></div></div>
      <span class="typo-count">${cnt}回</span>
    </div>`).join('');
}

    '焦りは禁物。ゆっくりでも正確に打つ練習を繰り返すことで指が覚えていきます。',
    '継続は力なり。毎日少しずつでも練習を続ければ必ず上達します。',
    'タイピングは筋肉と同じ。毎日の反復で指が勝手に動くようになります！',
  ];

  // プールに専用アドバイスがある場合は 85% の確率でそちらを優先
  if (pool.length > 0 && Math.random() < 0.85) {
    return pool[Math.floor(Math.random() * pool.length)];
  }
  // ときどき姿勢・環境ヒントを出す
  if (Math.random() < 0.3) {
    return occasionally[Math.floor(Math.random() * occasionally.length)];
  }
  return general[Math.floor(Math.random() * general.length)];
}

function endSession() {
  state.running = false;
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  typingInput.disabled = true;
  statTimer.classList.remove('urgent');
  $('pace-stat').style.display = 'none';

  const wpm = calcWpm();
  const acc = calcAcc();
  const best = getBest(state.lang, state.mode, state.level);
  const isNew = wpm > best;

  if (isNew) setBest(state.lang, state.mode, state.level, wpm);

  // タイプミスをlocalStorageに保存（苦手文字練習用）
  if (Object.keys(state.typoMap).length > 0) {
    const key = `typos_${state.lang}_${state.mode}_${state.level}`;
    const existing = JSON.parse(localStorage.getItem(key) || '{}');
    for (const [ch, cnt] of Object.entries(state.typoMap)) {
      existing[ch] = (existing[ch] || 0) + cnt;
    }
    localStorage.setItem(key, JSON.stringify(existing));
  }

  // ストリーク更新
  updateStreak();

  // 完了音
  playDone();

  resWpm.textContent = wpm;
  resAcc.textContent = acc + '%';
  resChars.textContent = state.totalCorrectChars;
  resBest.textContent = isNew ? wpm : best;
  newBestBadge.style.display = isNew ? 'block' : 'none';

  // アドバイスはタイムアタック・苦手練習で表示
  const adviceBox = $('advice-box');
  if (state.mode === 'timed' || state.mode === 'weak') {
    $('res-advice').textContent = getAdvice(wpm, acc, state.level, state.lang);
    adviceBox.style.display = 'flex';
  } else {
    adviceBox.style.display = 'none';
  }

  // タイプミス分析
  renderTypoAnalysis();

  // 履歴保存＆グラフ描画
  const hist = saveToHistory(wpm, acc);
  renderHistoryChart(hist);

  modalOverlay.classList.remove('hidden');
}

function resetSession(withCountdown = false) {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  state.running = false;
  state.startTime = null;
  state.timeLeft = state.selectedTime;
  state.totalCorrectChars = 0;
  state.totalTypedChars = 0;
  state.sentencesDone = 0;
  state.typoMap = {};
  state.liveWpmData = [];

  const isTimed = state.mode === 'timed' || state.mode === 'weak';
  statWpm.textContent = '0';
  statTimer.textContent = isTimed ? state.selectedTime : '0';
  statAcc.textContent = '100%';
  statScore.textContent = '0';
  statTimer.classList.remove('urgent');
  progressBar.style.width = '0%';
  typingInput.value = '';
  typingInput.classList.remove('error');
  typingInput.disabled = false;
  $('pace-stat').style.display = 'none';
  $('live-wpm-wrap').style.display = 'none';

  state.textQueue = buildQueue();
  state.currentIndex = 0;
  loadSentence(state.textQueue[0]);

  timerLabel.textContent = isTimed ? '秒' : '秒経過';
  hintText.textContent = '入力を開始するとタイマーがスタートします';

  if (withCountdown) {
    showCountdown(() => {});
  }
}

// ============================================================
//  INPUT HANDLER — English
// ============================================================
function handleEnInput(e) {
  const val = typingInput.value;

  if (!state.running && val.length > 0) {
    startSession();
  }

  const expected = state.segments[state.segIdx];
  if (expected === undefined) return;

  // We compare full typed value against sentence prefix
  const sentence = state.segments.join('');
  const typed = val;

  // Find longest correct prefix
  let correctLen = 0;
  for (let i = 0; i < typed.length && i < sentence.length; i++) {
    if (typed[i] === sentence[i]) correctLen++;
    else break;
  }

  // Update char display
  let html = '';
  for (let i = 0; i < sentence.length; i++) {
    let cls = 'char';
    if (i < typed.length) {
      cls += typed[i] === sentence[i] ? ' correct' : ' wrong';
    } else if (i === typed.length) {
      cls += ' pending cursor';
    } else {
      cls += ' pending';
    }
    html += `<span class="${cls}">${sentence[i] === ' ' ? '&nbsp;' : sentence[i]}</span>`;
  }
  textDisplay.innerHTML = html;

  const hasError = typed.length > 0 && typed[typed.length - 1] !== sentence[typed.length - 1];
  typingInput.classList.toggle('error', hasError);

  // Track stats for current input event
  if (val.length > state.segIdx) {
    const newChar = val[val.length - 1];
    const expChar = sentence[val.length - 1];
    if (newChar !== undefined && expChar !== undefined) {
      state.totalTypedChars++;
      if (newChar === expChar) state.totalCorrectChars++;
    }
  }

  state.segIdx = typed.length;

  // Sentence complete
  if (typed === sentence) {
    typingInput.value = '';
    state.segIdx = 0;
    if (state.mode === 'timed') {
      nextSentence();
    } else {
      nextSentence();
    }
  }

  updateStats();
}

// ============================================================
//  INPUT HANDLER — Japanese (romaji)
// ============================================================
function handleJaInput(e) {
  const val = typingInput.value.toLowerCase();

  if (!state.running && val.length > 0) {
    typingInput.value = '';
    startSession();
    state.inputBuffer = val;
  } else {
    state.inputBuffer = val;
  }

  if (state.segIdx >= state.segments.length) return;

  const seg = state.segments[state.segIdx];
  const opts = seg.options;

  // Find matching options
  const matching = opts.filter(o => o.startsWith(state.inputBuffer));
  const exact = opts.find(o => o === state.inputBuffer);

  if (exact) {
    // Segment complete!
    state.totalCorrectChars += seg.hira.length;
    state.totalTypedChars += state.inputBuffer.length;
    state.segIdx++;
    state.inputBuffer = '';
    typingInput.value = '';
    typingInput.classList.remove('error');

    if (state.segIdx >= state.segments.length) {
      // Sentence done
      nextSentence();
    } else {
      renderText();
      updateHint();
    }
  } else if (matching.length > 0) {
    // Still typing — valid prefix
    typingInput.classList.remove('error');
    renderText();
    updateHint();
  } else {
    // Wrong input
    state.totalTypedChars++;
    typingInput.classList.add('error');

    // Clear and keep last char if it could start a new match
    const lastChar = state.inputBuffer.slice(-1);
    const newOpts = opts.filter(o => o.startsWith(lastChar));
    if (newOpts.length > 0) {
      state.inputBuffer = lastChar;
    } else {
      state.inputBuffer = '';
    }
    typingInput.value = state.inputBuffer;
    updateHint();
  }

  updateStats();
}

// ============================================================
//  JAPANESE KEY PROCESSOR
// ============================================================
function commitCurrentSegment(typedStr) {
  const seg = state.segments[state.segIdx];
  state.totalCorrectChars += seg.hira.length;
  state.totalTypedChars  += typedStr.length;
  state.segIdx++;
  state.inputBuffer = '';
  typingInput.value   = '';
  typingInput.classList.remove('error');
  if (state.segIdx >= state.segments.length) {
    nextSentence();
    return true;
  }
  return false;
}

function processChar(ch) {
  if (state.segIdx >= state.segments.length) return;

  const seg  = state.segments[state.segIdx];
  const opts = seg.options;
  const buf  = state.inputBuffer + ch;

  const matching  = opts.filter(o => o.startsWith(buf));
  const exact     = opts.find(o => o === buf);
  const canExtend = matching.some(o => o.length > buf.length);

  if (exact && !canExtend) {
    // 完全一致かつ延長不可 → コミット
    playClick();
    const ended = commitCurrentSegment(buf);
    if (!ended) { renderText(); updateHint(); updateKeyboard(); }

  } else if (matching.length > 0) {
    // 有効なプレフィックス（延長可能な完全一致も含む）
    state.inputBuffer = buf;
    typingInput.value = buf;
    typingInput.classList.remove('error');
    renderText();
    updateHint();
    updateKeyboard();

  } else {
    // buf では一致なし
    // バッファ自体がすでに完全一致なら先にコミットして ch を再処理
    const prevExact = opts.find(o => o === state.inputBuffer);
    if (prevExact) {
      playClick();
      const ended = commitCurrentSegment(state.inputBuffer);
      if (!ended) processChar(ch);
      return;
    }

    // ミス入力
    playError();
    state.totalTypedChars++;
    state.typoMap[seg.hira] = (state.typoMap[seg.hira] || 0) + 1;
    typingInput.classList.add('error');
    const startMatch = opts.filter(o => o.startsWith(ch));
    state.inputBuffer = startMatch.length > 0 ? ch : '';
    typingInput.value = state.inputBuffer;
    updateHint();
  }

  updateKeyboard();
  updateStats();
}

// ============================================================
//  EVENT LISTENERS
// ============================================================
typingInput.addEventListener('input', e => {
  if (state.lang === 'ja') {
    // IME がコミットしたテキストをバッファで上書きする
    typingInput.value = state.inputBuffer;
    return;
  }
  handleEnInput(e);
});

// Skip button
$('skip-btn').addEventListener('click', () => {
  if (state.running || !state.running) {
    state.inputBuffer = '';
    typingInput.value = '';
    typingInput.classList.remove('error');
    if (!state.running && typingInput.disabled === false) {
      nextSentence();
    } else if (state.running) {

    }
    typingInput.focus();
  }
});

// IME が勝手に変換しようとしたらバッファを復元する
typingInput.addEventListener('compositionstart', () => {
  if (state.lang === 'ja') typingInput.value = state.inputBuffer;
});
typingInput.addEventListener('compositionend', () => {
  if (state.lang !== 'ja') return;
  // compositionend の後にブラウザが IME テキストをコミットするので
  // 次の tick で上書きする
  setTimeout(() => { typingInput.value = state.inputBuffer; }, 0);
});

// e.code → 文字 のマップ（IME が e.key='Process' を返すときに使う）
const CODE_TO_CHAR = {
  'KeyA':'a','KeyB':'b','KeyC':'c','KeyD':'d','KeyE':'e','KeyF':'f',
  'KeyG':'g','KeyH':'h','KeyI':'i','KeyJ':'j','KeyK':'k','KeyL':'l',
  'KeyM':'m','KeyN':'n','KeyO':'o','KeyP':'p','KeyQ':'q','KeyR':'r',
  'KeyS':'s','KeyT':'t','KeyU':'u','KeyV':'v','KeyW':'w','KeyX':'x',
  'KeyY':'y','KeyZ':'z',
  'Minus':'-','Comma':',','Period':'.','BracketLeft':'[',
  'BracketRight':']','Slash':'/','Quote':"'"
};

// 日本語モード: keydown で生キーをキャプチャして IME をバイパス
typingInput.addEventListener('keydown', e => {
  if (state.lang !== 'ja') return;

  if (e.key === 'Backspace') {
    e.preventDefault();
    if (state.inputBuffer.length > 0) {
      state.inputBuffer = state.inputBuffer.slice(0, -1);
      typingInput.value = state.inputBuffer;
      renderText();
      updateHint();
    }
    return;
  }

  // e.key が 'Process' のときは IME が変換中なので e.code から文字を取得
  let ch;
  if (e.key === 'Process' || e.isComposing) {
    ch = CODE_TO_CHAR[e.code];
    if (!ch) return;
  } else {
    if (e.key.length !== 1) return; // Tab, Enter, Arrow 等を無視
    ch = e.key.toLowerCase();
  }

  e.preventDefault(); // IME に渡さない

  if (!state.running && !state.startTime) {
    startSession();
  }

  flashKey(ch);
  processChar(ch);
});

//  CUSTOM TEXT MODAL

$('custom-btn').addEventListener('click', () => {
  $('custom-modal').classList.remove('hidden');
  $('custom-textarea').focus();

$('custom-cancel-btn').addEventListener('click', () => {
  $('custom-modal').classList.add('hidden');
  typingInput.focus();
});

$('custom-set-btn').addEventListener('click', () => {
  const raw = $('custom-textarea').value.trim();
  if (!raw) return;

  // 入力言語を自動判定（ひらがな・カタカナが含まれていれば日本語）
  const isJa = /[\u3040-\u30FF]/.test(raw);
  state.lang = isJa ? 'ja' : 'en';
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === state.lang);
  });

  // 行単位に分割してキューに使う（1行 = 1問）
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  $('custom-modal').classList.add('hidden');
  $('custom-textarea').value = '';

  modalOverlay.classList.add('hidden');
  resetSession();

  // カスタム文章でキューを上書き
  state.textQueue = shuffled(lines.length > 1 ? lines : lines.concat(buildQueue()));
  state.currentIndex = 0;
  loadSentence(state.textQueue[0]);
  typingInput.focus();
});
